version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: equipment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/equipment_db
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - postgres
    command: uvicorn server.api:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - postgres
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  pgdata: